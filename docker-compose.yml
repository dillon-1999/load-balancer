services:
  hello-server-1:
    build:
      context: .
      dockerfile: server-dockerfile
    container_name: hello-server-1
    labels:
      service: hello
    networks:
      - proxy-network
    restart: unless-stopped

  hello-server-2:
    build:
      context: .
      dockerfile: server-dockerfile
    container_name: hello-server-2
    labels:
      service: hello
    networks:
      - proxy-network
    restart: unless-stopped

  hello-server-3:
    build:
      context: .
      dockerfile: server-dockerfile
    container_name: hello-server-3
    labels:
      service: hello
    networks:
      - proxy-network
    restart: unless-stopped
  proxy-server:
    build:
      context: .
      dockerfile: proxy-dockerfile
    container_name: proxy-server
    networks:
      - proxy-network
    ports:
      - "8000:8000"
    volumes:
      -  /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
networks:
  proxy-network:
    driver: bridge